<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>書籍一覧</title>
</head>
<body>
    <h1>書籍一覧</h1>
    <table>
        <tr>
            <th>ID</th>
            <th>タイトル</th>
            <th>著者</th>
            <th>ステータス</th>
            <th>評価</th>
            <th>登録日</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.status}"></td>
            <td th:text="${book.rating}"></td>
            <td th:text="${#temporals.format(book.createdAt, 'yyyy/MM/dd HH:mm:ss')}"></td>
        </tr>
    </table>
</body>
</html>
